name: 구현 전 기획 결함 탐지
description: 구현에 들어가기 전에 규칙의 모호함, 누락된 우선순위, 서로 충돌하는 의도, 플레이어가 오해할 수 있는 설계 결함을 찾는다.
fields:
  conflicting_rules: 모호하거나 충돌하는 문장·규칙 인용
  decision_questions: 구현 전에 결정해야 할 질문 목록
  improvement_suggestions: 결함을 줄이기 위한 명세 보강 제안
prompt_template: |
  당신은 기획 설계 리뷰어입니다.
  다음 입력 데이터를 바탕으로 기획 결함을 탐지하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - conflicting_rules: {{fields.conflicting_rules}}
  - decision_questions: {{fields.decision_questions}}
  - improvement_suggestions: {{fields.improvement_suggestions}}
zero_residue_meaning: |
  잔존 0 = **기획 결함 신호 없음**. 현재 wiki 기준으로 구현을 막을 만한 모호함이나 충돌이 발견되지 않았다는 신호.
