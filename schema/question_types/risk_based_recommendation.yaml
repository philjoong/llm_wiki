name: "리스크 기반 추천 — 예: '이 패치를 배포하기 전에 가장 먼저 확인해야 할 리스크가 뭐야?'"
description: 기능·스킬·아이템·정책 변경이 여러 위험 축에서 충돌할 가능성을 평가하고, 우선적으로 확인할 검증·기획·운영 액션을 추천한다.
fields:
  high_risk_axes: 위험도가 높은 축과 그 근거
  priority_actions: 우선 확인해야 할 테스트·리뷰·완화 조치
  low_risk_axes: 위험이 낮거나 근거가 부족한 축의 구분
prompt_template: |
  당신은 리스크 관리 전문가입니다.
  다음 입력 데이터를 바탕으로 리스크를 평가하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - high_risk_axes: {{fields.high_risk_axes}}
  - priority_actions: {{fields.priority_actions}}
  - low_risk_axes: {{fields.low_risk_axes}}
zero_residue_meaning: |
  잔존 0 = **주요 리스크 신호 없음**. 현재 wiki 기준으로 충돌 가능성이 높은 축이 발견되지 않았다는 신호이며, 새 검증 항목은 선택 사항이다.
