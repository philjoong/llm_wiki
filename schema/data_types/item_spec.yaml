name: "Item Spec"
description: "Extracts item templates, item instances, and currency accounts with item classification axes, mutable state, acquisition rules, and invariants."
fields:
  entityKind: "Choose one enum: ItemTemplate, ItemInstance, CurrencyAccount. Pick the schema shape that best matches the source."
  id: "Template id for ItemTemplate, instanceId for ItemInstance, or ownerId for CurrencyAccount."
  name: "Display name for an item template. Use N/A for pure instances/accounts."
  version: "Version or patch version. Use N/A if not present."
  itemType: "Choose one enum: Equipment, Consumable, Material, QuestItem, Container, Key, Recipe, Cosmetic, Currency, Misc."
  equipmentSlot: "Choose one enum: Weapon.MainHand, Weapon.OffHand, Weapon.TwoHanded, Weapon.Ranged, Armor.Head, Armor.Chest, Armor.Legs, Armor.Feet, Armor.Hands, Armor.Shoulders, Armor.Back, Accessory.Ring, Accessory.Necklace, Accessory.Trinket, Accessory.Belt, None. Use None unless itemType is Equipment."
  rarity: "Choose one enum: Trash, Common, Uncommon, Rare, Epic, Legendary, Mythic, Artifact."
  bindingType: "Choose one enum: Unbound, BoundOnPickup, BoundOnEquip, BoundToAccount, BoundToCharacter, QuestBound."
  stackingPolicy: "Choose one enum: NotStackable, Stackable, Chargeable, Renewable."
  usageType: "Choose one enum: Instant, CastTime, Passive, Equippable, Deployable, Learnable, Consumable, NonUsable."
  iconId: "Icon id. Use N/A if absent."
  description: "In-game description text. Use N/A if absent."
  requirements: "Structured object with itemLevel, requiredLevel, requiredClass array, requiredFaction."
  stackAndDurability: "Structured object with maxStackSize, maxDurability, maxCarryCount, isUnique."
  prices: "Structured object with sellPrice, buyPrice, buyPriceCurrency enum Gold, Silver, Copper, PremiumCoin, Gem, HonorPoint, ValorPoint, GuildCoin, EventToken, CraftingPoint."
  stats: "Structured object with baseStats and bonusStats arrays. Each stat includes attribute, operation enum Set/Add/Subtract/Multiply/AddState/RemoveState/Trigger, value, scalingTier."
  setId: "Set item id. Use N/A if none."
  socketSlots: "Number of socket slots."
  effectsOnUse: "Array of Effect objects using skill Effect schema."
  effectsOnEquip: "Array of Effect objects using skill Effect schema."
  skillGranted: "Skill id granted by the item. Use N/A if none."
  tags: "Array of ItemTag values such as Weapon.Sword, Weapon.Bow, Weapon.Staff, Weapon.Dagger, Weapon.Shield, Armor.Heavy, Armor.Light, Armor.Cloth, Consumable.Potion, Consumable.Scroll, Consumable.Food, Material.Ore, Material.Herb, Material.Leather, Set.TierPiece, Set.WorldBoss, Collection.Seasonal, Legendary.Quest, ReadyForUpgrade, BindOnUse."
  acquirableFrom: "Array of SourceType enums: MonsterDrop, QuestReward, ShopPurchase, CraftingResult, DungeonClear, RaidLoot, EventReward, LoginReward, Mail, Trade, GMGrant, StartingGear."
  lootCondition: "Choose one enum: Always, MinLevelRequired, InPartyRequired, InRaidRequired, FirstKillOfDay, BossMechanicCompleted, SpecificQuestActive, EventActive.SeasonalHalloween, ClassMatchesTemplate. Use N/A if not applicable."
  tradeFlags: "Structured object with tradable, sellable, destroyable, isHeirloom, isSeasonal booleans."
  cooldown: "Structured object with cooldownShared and cooldownDuration."
  instanceState: "For ItemInstance only: structured object with templateId, ownerId, location, stackCount, currentDurability, isBound, isLocked, isEquipped, enhancementLevel, sockets, randomStats, acquiredAt, acquiredFrom, expiresAt, cooldownRemaining."
  location: "For ItemInstance only: locationType enum Inventory, Equipment, Bank, GuildBank, Mail, Trade, AuctionHouse, Dropped, Destroyed plus containerId and slotIndex."
  currencyBalances: "For CurrencyAccount only: array of balances with currencyType, amount, capMax, weeklyEarned, weeklyCap, soulbound."
  invariant_violations: "List item schema violations, such as Equipment with equipmentSlot None, non-Equipment with non-None slot, NotStackable maxStackSize not 1, Stackable maxStackSize below 2, stackCount outside bounds, durability outside bounds, equipped item not in Equipment location, QuestBound tradable/sellable/destroyable, unique item maxCarryCount not 1, buyPrice without ShopPurchase, or currency over cap. Use [] if none."
