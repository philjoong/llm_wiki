name: "State Spec"
description: "Extracts buffs, debuffs, crowd control, auras, markers, and environmental states with stacking, ticking, removal, immunity, and interactions."
fields:
  id: "Stable state id, such as state.burn."
  name: "State display name."
  version: "Version or patch version. Use N/A if not present."
  category: "Choose one enum: Buff, Debuff, CrowdControl, DoT, HoT, Shield, Aura, Transformation, Marker, Environmental."
  polarity: "Choose one enum: Positive, Negative, Neutral."
  dispelType: "Choose one enum: Magic, Physical, Poison, Curse, Disease, Enrage, Undispellable."
  stackingMode: "Choose one enum: NotStackable, RefreshDuration, AddStack, Independent, HighestWins."
  tickType: "Choose one enum: NoTick, Periodic, OnEvent, Once."
  visibilityType: "Choose one enum: Visible, Hidden, OwnerOnly, AllyOnly."
  appliesTo: "Choose one enum: Player, Monster, Both, Environment."
  iconId: "Icon id. Use N/A if absent."
  description: "In-game description text. Use N/A if absent."
  durationType: "Choose one enum from Skill DurationType: Instant, OverTime, Permanent, UntilDispelled, UntilDeath."
  duration: "Structured object with baseDuration and maxDuration in seconds."
  stacking: "Structured object with stackMax and stackDecayMode enum AllAtOnce, OneAtATime, ResetOnRefresh, IndependentDecay."
  effects: "Array of Effect objects using skill Effect schema."
  periodic: "Structured object with tickInterval number and tickEffects array. Use tickInterval 0 and [] for NoTick."
  triggerOn: "Structured array. Each item includes event enum OnApply, OnRemove, OnTick, OnStackAdded, OnStackRemoved, OnDamageTaken, OnDamageDealt, OnHeal, OnMove, OnAttack, OnSkillUsed, OnDeath, OnExpire; optional condition; and effect."
  immunitiesGranted: "Array of immunity tags such as CC.Stun, CC.Silence, CC.Root, CC.Slow, CC.Knockback, CC.Pull, CC.Airborne, CC.Fear, CC.Sleep, CC.Charm, Damage.True, Dispel, Taunt."
  removeOn: "Array of RemoveCondition enums: OnExpire, OnDispel, OnDamageTaken, OnMove, OnSkillUsed, OnDeath, OnZoneChange, OnCombatEnd, OnOwnerLogout, OnSourceDeath, OnSourceTooFar, Manual."
  tags: "Array of StateTag values such as Element.Fire, Element.Ice, Element.Lightning, Element.Poison, Element.Holy, Element.Shadow, CC.Hard, CC.Soft, CC.Break, Origin.Skill, Origin.Item, Origin.Environment, Origin.Quest, Group.Blessing, Group.Curse, Group.Bleed, Group.Stance, Group.Aura, Purgeable, Stealable, Reflectable."
  interactions: "Structured array. Each item includes type enum Replaces, Cancels, Prevents, Amplifies, Consumes, Transforms; withStateId; withTag; result."
  priority: "Priority number for competing states."
  flags: "Structured object with isHarmful and isPurgeableByPlayer booleans."
  invariant_violations: "List state schema violations, such as Positive with isHarmful true, CrowdControl without CC tag, DoT not Periodic/Subtract HP, HoT not Periodic/Add HP, Periodic without tickInterval or tickEffects, NotStackable stackMax not 1, AddStack stackMax below 2, Undispellable with OnDispel, baseDuration above maxDuration, Instant with non-Marker/non-Environmental, immunity on non-Positive state, or missing referenced state ids. Use [] if none."
