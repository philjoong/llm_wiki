name: "조합 폭발 테스트 — 예: '직업 3종 × 스킬 5개 × 난이도 4단계 조합 중 테스트 안 된 케이스를 찾아줘'"
description: 사람이 수동으로 나열하기 어려운 조건 축의 곱집합에서 놓치기 쉬운 테스트 케이스를 만든다.
fields:
  missing_combinations: 사람이 놓치기 쉬운 조합 후보
  risk_reasoning: 각 조합이 위험한 이유와 검증해야 할 기대 결과
  new_cases: 기존 테스트와 중복되지 않는 신규 케이스 목록
prompt_template: |
  당신은 테스트 엔지니어입니다.
  다음 입력 데이터를 바탕으로 조합 폭발 테스트 케이스를 생성하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - missing_combinations: {{fields.missing_combinations}}
  - risk_reasoning: {{fields.risk_reasoning}}
  - new_cases: {{fields.new_cases}}
zero_residue_meaning: |
  잔존 0 = **추가 조합 없음**. 정의된 조건 축의 조합이 이미 테스트되었거나 명시적으로 제외되어 새로 생성할 케이스가 없다는 신호.
