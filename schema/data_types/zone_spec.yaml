name: "Zone Spec"
description: "Extracts game zones, maps, dungeons, raids, instances, safe areas, restrictions, environmental modifiers, spawns, travel, and zone events."
fields:
  id: "Stable zone id, such as zone.crystal_forest."
  name: "Zone display name."
  parentZoneId: "Parent zone id. Use N/A if none."
  zoneType: "Choose one enum: OpenWorld, City, Village, Wilderness, Dungeon, Raid, Battleground, Arena, Instance, SafeHaven, Transition."
  biomeType: "Choose one enum: Plains, Forest, Desert, Snow, Mountain, Swamp, Cave, Ocean, Underwater, Sky, Volcanic, Abyss, Urban."
  pvpRule: "Choose one enum: Disabled, Enabled, Flagged, Consensual, Arena, Warzone."
  safetyLevel: "Choose one enum: Sanctuary, Safe, Contested, Hostile, Lawless."
  instanceMode: "Choose one enum: NotInstanced, SharedInstance, PartyInstance, RaidInstance, SoloInstance."
  boundary: "Structured object with shape enum Rectangle, Sphere, Polygon, Complex; center Vector3; size Vector3; polygonPoints array if needed."
  subZones: "Array of child Zone ids."
  access: "Structured object with recommendedLevelMin, recommendedLevelMax, requiredLevel, requiredQuest, requiredItem."
  restrictions: "Structured array. Each item includes action enum UseSkill.Damage, UseSkill.Heal, UseSkill.Summon, UseSkill.Mobility, UseSkill.Any, AttackPlayer, AttackMonster, UseMount, Fly, Duel, Trade, DropItem, OpenAuctionHouse, Resurrect, Teleport, Stealth; allowed; reason; priority; appliesTo enum AllEntities, PlayersOnly, MonstersOnly, NonFactionMembers, BelowLevelThreshold."
  modifiers: "Structured array. Each item includes target enum AllEntities, PlayersOnly, MonstersOnly, AllyOfZoneOwner, EnemyOfZoneOwner; attribute; operation enum Set/Add/Subtract/Multiply/AddState/RemoveState/Trigger; value; optional condition."
  environment: "Structured object with currentWeather enum Clear, Cloudy, Rain, Storm, Snow, Blizzard, Fog, Sandstorm, Ashfall, Corruption; weatherCycle; currentTimeOfDay enum Dawn, Day, Dusk, Night, Eclipse; hasDayNightCycle; ambientLight."
  spawnGroups: "Structured array. Each item includes id, templateIds, spawnArea, maxConcurrent, respawnInterval, densityTier enum Sparse, Normal, Dense, Swarm, levelRange, condition enum Always, DuringNight, DuringDay, DuringWeather.Storm, DuringEvent.Invasion."
  npcList: "Array of fixed NPC ids."
  resourceNodes: "Array of resource node ids or structured resource node objects."
  entryPoints: "Array of EntryPoint objects: id, position Vector3, isDefault."
  portals: "Array of Portal objects: id, position, destinationZoneId, destinationEntryPoint, requiresKey, cost, condition."
  recall: "RecallPolicy object with allowed boolean and cooldown number."
  instance: "Structured object with instanceId, ownerId, difficultyLevel, resetPolicy. difficultyLevel includes name, tier, monsterHPMultiplier, monsterDamageMultiplier, lootQualityTier, maxPartySize. resetPolicy mode enum Never, OnEmpty, Daily, Weekly, OnBossKill, Manual."
  activeEvents: "Structured array. Each ZoneEvent includes id, name, eventType enum Invasion, WorldBossSpawn, WarDeclared, Festival, WeatherStorm, Eclipse, TreasureHunt; startTime, endTime, participants, modifiers, spawnOverrides."
  flags: "Structured object with isStartingZone, isCapitalCity, isSeasonalOnly booleans."
  invariant_violations: "List zone schema violations, such as Raid not RaidInstance, Sanctuary not Disabled PvP, Sanctuary missing Damage restriction, instanced zone without instanceId, RaidInstance ownerId not raid.*, parent/subZone mismatch, portal destination missing, requiredLevel above recommended max, Never reset with schedule, or event startTime >= endTime. Use [] if none."
