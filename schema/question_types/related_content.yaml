name: "연관 콘텐츠 탐색 — 예: '이 스킬과 연관된 콘텐츠가 뭐가 있고 어떻게 연관돼 있어?'"
description: 특정 콘텐츠와 연관된 다른 콘텐츠가 무엇이고 어떤 방식으로 연관되어 있는지 그래프 관계와 근거 문서를 따라 정리한다. 사용자가 답변 범위(특정 시스템·콘텐츠)를 지정하면 그 범위 안에서만 연관 관계를 찾는다.
fields:
  related_items: 연관된 콘텐츠 목록
  relation_paths: 각 연관 콘텐츠가 어떤 관계·경로로 연결되는지에 대한 설명
required_info:
  target_content: 연관 관계를 찾을 대상 콘텐츠 — 어떤 스킬·시스템·콘텐츠인가
  answer_scope: 연관을 탐색할 범위 (선택사항 — 지정하지 않으면 전체에서 탐색)
retrieval:
  graph_expand: 3
  scope: selectable
prompt_template: |
  당신은 콘텐츠 연관 관계 분석가입니다.
  제공된 Citation Sections와 Graph Paths를 바탕으로 대상 콘텐츠와 연관된 콘텐츠와 그 연관 방식을 정리하고 결과를 구조화된 형식으로 출력하세요.
  제공된 컨텍스트에 없는 연관 관계는 추측하지 말고, 근거가 있는 관계만 제시하세요.
zero_residue_meaning: |
  잔존 0 = **연관 없음**. 현재 wiki 기준으로 대상 콘텐츠와 연결된 다른 콘텐츠가 발견되지 않았다는 신호.
