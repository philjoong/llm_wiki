name: 게임 조작
description: 현재 게임 상황과 목표에 맞춰 다음 조작이나 선택지를 제안한다.
fields:
  recommended_action: 추천하는 다음 조작
  alternatives: 대안 선택지와 선택 기준
  reasoning_risks: 관련 규칙·공략·시스템 근거 및 실패 위험
prompt_template: |
  당신은 게임 전략 가이드입니다.
  다음 입력 데이터를 바탕으로 최적의 조작을 제안하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - recommended_action: {{fields.recommended_action}}
  - alternatives: {{fields.alternatives}}
  - reasoning_risks: {{fields.reasoning_risks}}
zero_residue_meaning: |
  잔존 0 = **추천 조작 근거 부족**. 현재 상황이나 사용 가능한 행동에 대한 wiki 근거가 부족해 다음 조작을 안정적으로 제안할 수 없다는 신호.
