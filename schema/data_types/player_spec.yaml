name: "Player Spec"
description: "Extracts a player character as atomic classification axes, runtime state, stats, equipment, skills, social links, and action restrictions."
fields:
  id: "Stable player id, such as player.user_12345. Use N/A if unknown."
  name: "Character display name."
  accountId: "Owning account id. Use N/A if not present."
  class: "Choose one enum: Warrior, Mage, Archer, Rogue, Priest, Paladin, Necromancer, Summoner."
  role: "Choose one enum: Tank, Melee_DPS, Ranged_DPS, Healer, Support, Hybrid."
  faction: "Choose one enum: Alliance, Horde, Neutral, Outlaw."
  progression: "Structured object with level, experience, and experienceToNext as numbers."
  resources: "Structured object with hp, hpMax, mana, manaMax, stamina, staminaMax as numbers."
  combatStats: "Structured object with attackPower, spellPower, defense, magicResist, critChance, critDamage, attackSpeed, moveSpeed, cooldownReduction."
  lifeState: "Choose one enum: Alive, Dead, Ghost, Reviving."
  combatState: "Choose one enum: InCombat, OutOfCombat, Engaging."
  movementState: "Choose one enum: Idle, Walking, Running, Sprinting, Jumping, Falling, Mounted, Flying, Swimming."
  controlState: "Array of enums: Normal, Stunned, Silenced, Rooted, Slowed, Feared, Airborne, Sleeping, Charmed."
  visibilityState: "Choose one enum: Visible, Stealthed, Invisible, Detected."
  pvpState: "Choose one enum: PvE_Only, PvP_Enabled, PvP_Flagged, WarDeclared."
  buffs: "Structured array of StatusEffect objects: id, source, stacks, durationRemaining, dispellable."
  debuffs: "Structured array of StatusEffect objects: id, source, stacks, durationRemaining, dispellable."
  position: "Vector3 object with x, y, z. Use N/A if not present."
  rotation: "Facing direction in degrees as a number. Use N/A if not present."
  zoneId: "Current Zone id."
  instanceId: "Current instance id. Use empty string or N/A if not instanced."
  skillSlots: "Structured array: slotIndex, skillId, level, cooldownRemaining, chargesCurrent, enabled."
  skillBook: "Array of learned skill ids."
  inventory: "Array of item slots or item ids if listed."
  equipment: "Structured equipment object keyed by slot, with item id/name/rarity/itemLevel/stats when available."
  gold: "Gold or main currency amount as a number."
  partyId: "Current party id. Use N/A if none."
  guildId: "Current guild id. Use N/A if none."
  raidId: "Current raid id. Use N/A if none."
  flags: "Structured object with isBot, isGM, isNewbie booleans."
  actionRestrictions: "Structured array. Each item includes action, condition, allowed, reason, priority. action enum: UseSkill, Move, Attack, UseItem, Interact, Trade, Loot, Mount, Emote, Chat. condition enum examples: LifeState.Dead, LifeState.Ghost, ControlState.Stunned, ControlState.Silenced, ControlState.Rooted, MovementState.Mounted, InSafeZone, InPvPZone, InCombat, OutOfCombat."
  invariant_violations: "List player schema violations, such as hp outside 0..hpMax, mana outside 0..manaMax, Dead with hp not 0, Dead not OutOfCombat, Stunned without action restrictions, level below 1, or skillSlots not present in skillBook. Use [] if none."
