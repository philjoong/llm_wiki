name: "Screen Spec"
description: "Extracts UI screens, transitions, input bindings, data bindings, trigger bindings, and navigation flows as a state-machine style schema."
fields:
  entityKind: "Choose one enum: Screen, NavigationFlow."
  id: "Stable screen or flow id, such as screen.world_map or flow.world_map_teleport."
  name: "Display name."
  version: "Version or patch version. Use N/A if absent."
  screenType: "Choose one enum: HUD, MainMenu, SubMenu, Modal, Popup, Overlay, Panel, Tooltip, LoadingScreen, CinematicScreen, InputPrompt."
  screenCategory: "Choose one enum: Navigation, Combat, Inventory, Shop, Social, Quest, Character, Settings, System, Notification, Tutorial."
  layerType: "Choose one enum: World, HUD, Menu, Modal, Popup, Top."
  inputBlockingMode: "Choose one enum: FullBlock, PartialBlock, PassThrough."
  lifecycleState: "Choose one enum: NotLoaded, Loading, Opening, Active, Inactive, Closing, Closed."
  openPreconditions: "Array of ScreenPrecondition objects: condition enum Player.LevelAtLeast, Player.QuestCompleted, Player.HasItem, Player.InZone.Type, Player.NotInCombat, Player.Alive, Session.LoggedIn, Session.CharacterSelected, Tutorial.Completed, UI.NoOtherModalOpen, Always; value, reason, priority."
  closePreconditions: "Array of ScreenPrecondition objects using the same condition enum as openPreconditions."
  inputBindings: "Structured array. Each InputBinding includes source enum Hotkey, MouseClick, Gamepad, Touch, Voice, System, Timer, Event; inputKey, modifiers array Ctrl/Shift/Alt/Meta, action enum OpenScreen, CloseScreen, Transition, TriggerInteraction, SelectItem, ConfirmSelection, Cancel, Navigate, Scroll; actionParams, enabled, priority."
  transitions: "Structured array. Each ScreenTransition includes id, fromScreenId, toScreenId, transitionType enum Open, Close, Replace, Push, Pop, PopToRoot, Switch; trigger enum InputBinding, SystemEvent, Timer, DataChanged; preconditions; onTransition effects enum PlaySound, PlayAnimation, SaveState, ResetState, DispatchInteraction."
  triggers: "Structured array. Each ScreenTriggerBinding includes triggerId, triggerEvent enum OnClick, OnSelect, OnDoubleClick, OnConfirm, OnCancel, OnScreenOpen, OnScreenClose, OnTimer; interactionId, paramMapping."
  dataBindings: "Structured array. Each DataBinding includes bindingId, source enum Player.Inventory, Player.Skills, Player.Stats, Player.Currency, Zone.Current, Zone.List, Shop.Items, Quest.Active, Quest.Available, Dungeon.List, Party.Members; refreshMode enum Once, OnDataChange, Polling, Manual; emptyStateBehavior enum ShowEmptyMessage, ShowPlaceholder, HidePanel, BlockScreenOpen."
  hierarchy: "Structured object with parentScreenId and allowedChildren array."
  flags: "Structured object with isSingleton, isModalBlocking, pauseGameOnOpen, cancelableByEscKey booleans."
  flowSteps: "For NavigationFlow only: array of FlowStep objects with stepOrder, screenId, action enum OpenScreen, WaitForInput, Select, Confirm, TriggerInteraction, WaitForTransition; expectedResult enum ScreenOpened, ScreenClosed, InteractionSucceeded, InteractionFailed, PopupShown; failurePath."
  invariant_violations: "List UI schema violations, such as Modal layer not FullBlock, singleton active duplicates, parent missing allowedChildren reciprocal, transition fromScreenId not self, missing toScreenId, ambiguous input binding without priority, LoadingScreen with non-Cancel inputs, Modal missing cancelableByEscKey, non-contiguous flow steps, trigger interactionId missing, or Shop data source outside Shop category. Use [] if none."
