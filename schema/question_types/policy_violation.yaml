name: "정책 위반 탐지 — 예: '이 아이템 드롭 확률이 운영 정책을 위반하지는 않아?'"
description: 사용자/운영 정책에 위반되는 동작·콘텐츠·상호작용을 식별한다.
fields:
  violated_policy: 위반된 정책 항목 인용
  recommendation: 위반 정도 및 후속 조치 권고
prompt_template: |
  당신은 정책 준수 감시자입니다.
  다음 입력 데이터를 바탕으로 정책 위반 여부를 식별하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - violated_policy: {{fields.violated_policy}}
  - recommendation: {{fields.recommendation}}
zero_residue_meaning: |
  잔존 0 = **위반 없음 (긍정적 신호)**. 명시된 정책 어디에도 어긋나지 않았다는 결론.
  "검색 실패"가 아니라 "정상"의 의미다.
