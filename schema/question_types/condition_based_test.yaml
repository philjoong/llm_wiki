name: 조건 기반 가상 테스트
description: 특정 조건/상호작용에서 시스템이 어떻게 동작해야 하는지 가상의 테스트 케이스로 검증한다.
fields:
  cited_rules: 인용된 규칙/정책/시스템 페이지
  test_result: 조건에 적용 가능한 결과 한 줄 또는 명세 공백
prompt_template: |
  당신은 가상 테스트 시뮬레이터입니다.
  다음 입력 데이터를 바탕으로 가상 테스트를 수행하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - cited_rules: {{fields.cited_rules}}
  - test_result: {{fields.test_result}}
zero_residue_meaning: |
  잔존 0 = **명세 공백**. 이 조건에 대한 규칙이 wiki 어디에도 정의되어 있지 않다는 신호.
  "결과 없음"이 아니라 "사람이 정의해야 한다"는 정상적인 출력이다.
