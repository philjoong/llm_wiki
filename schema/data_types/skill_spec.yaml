name: "Skill Spec"
description: "Extracts a game skill as atomic tags, numeric parameters, restrictions, effects, and interactions. Enum fields must use only the listed values."
fields:
  id: "Stable skill id, such as skill.fireball. If no id exists in the source, create a concise lowercase dot-separated id."
  name: "Display name of the skill."
  version: "Version or patch version for this skill. Use N/A if not present."
  activationType: "Choose one enum: Active, Passive, Toggle, Triggered, Channeled."
  targetingMode: "Choose one enum: Targeted, NonTargeted, SelfCast, GroundTargeted, DirectionSkillshot, AutoTarget."
  areaType: "Choose one enum: SingleTarget, MultiTarget, AreaOfEffect, Line, Chain, Global."
  targetFaction: "Choose one enum: Enemy, Ally, Self, Neutral, Any, None."
  effectCategory: "Array of enums. Choose one or more: Damage, Heal, Buff, Debuff, CrowdControl, Shield, Mobility, Summon, Resource, Utility."
  damageType: "Choose one enum: Physical, Magical, True, Fire, Ice, Lightning, Poison, Holy, Shadow, None. Use None when effectCategory does not include Damage."
  controlType: "Choose one enum: Stun, Silence, Root, Slow, Knockback, Pull, Airborne, Fear, Sleep, Charm, None. Use None when effectCategory does not include CrowdControl."
  durationType: "Choose one enum: Instant, OverTime, Permanent, UntilDispelled, UntilDeath."
  interruptibleState: "Choose one enum: Interruptible, Uninterruptible, CancelOnMove."
  rangeCategory: "Choose one enum: Melee, Short, Medium, Long, Extreme, Infinite."
  resourceType: "Choose one enum: Mana, Stamina, Rage, Energy, Health, Charges, Cooldown, Free."
  cooldown: "Cooldown in seconds as a number. Use 0 if none or passive."
  castTime: "Cast time in seconds as a number. Use 0 for instant."
  channelDuration: "Channel duration in seconds as a number. Use 0 unless activationType is Channeled."
  range: "Actual range in meters as a number. Use 0 for self-only skills."
  areaRadius: "Area radius in meters as a number. Use 0 unless areaType is AreaOfEffect."
  resourceCost: "Resource cost as a number. Use 0 when resourceType is Free or Cooldown-only."
  chargesMax: "Maximum charges as a number. Use 1 for non-charge skills unless source says otherwise."
  chargeRegenTime: "Charge regeneration time in seconds as a number. Use 0 for non-charge skills."
  archetype: "Choose one enum if applicable: SingleTargetActive, AoEActive, SkillshotActive, SingleTargetHeal, AoEHeal, SingleTargetBuff, AoEBuff, SingleTargetDebuff, AoEDebuff, SingleTargetCC, AoECC, SelfBuff, SelfShield, MobilitySkill, SummonSkill, UtilityActive, StatPassive, TriggeredPassive, AuraPassive, ToggleStance, ToggleAura, ChanneledBeam, ChanneledAoE, ChanneledHeal. Use N/A if no archetype fits."
  restrictions: "Structured array. Each item must include condition, allowed, reason, priority. condition enum: InSafeZone, InPvPZone, InDungeon, InWater, InCombat, OutOfCombat, Silenced, Stunned, Rooted, Mounted, Stealthed, TargetIsAlly, TargetIsEnemy, TargetIsDead, TargetIsInvulnerable, TargetOutOfSight, CooldownReady, CooldownNotReady, ResourceSufficient, ResourceInsufficient, Always, Never. allowed is boolean. reason is a short tag. priority is a unique number where 1 is checked first."
  effects: "Structured array. Each item must include target, operation, attribute, value, duration, stackable, stackMax, dispellable, and optional condition. target enum: Caster, PrimaryTarget, SecondaryTargets, AllEnemiesInArea, AllAlliesInArea, Ground, Global. operation enum: Set, Add, Subtract, Multiply, AddState, RemoveState, Trigger. attribute enum: HP, Mana, Stamina, MoveSpeed, AttackSpeed, AttackPower, Defense, CritChance, State, Position, Cooldown, Resource. value may be number or tag string. duration is seconds. stackable and dispellable are booleans."
  interactions: "Structured array. Each item must include type, withTag, result. type enum: AmplifiedBy, DiminishedBy, NullifiedBy, Triggers, Consumes, RequiresState. withTag is a related state tag, skill id, or classification tag. result may include damageMultiplier, durationMultiplier, additionalEffect, blocked."
  invariant_violations: "List any detected schema rule violations, such as Damage with damageType None, CrowdControl with controlType None, Passive with cooldown/resourceCost above 0, Channeled with channelDuration 0, AreaOfEffect with areaRadius 0, SelfCast with targetFaction not Self, NonTargeted with SingleTarget, Free with resourceCost above 0, duplicate restriction priorities, or OverTime without any effect duration above 0. Use [] if none."
