name: "Session Spec"
description: "Extracts login sessions, parties, raids, guilds, instances, battlegrounds, matchmaking, notifications, and social/group lifecycle state."
fields:
  entityKind: "Choose one enum: Session, Party, Raid, Guild, Instance, Battleground, Notification."
  id: "sessionId, partyId, raidId, guildId, instanceId, bgId, or notification id depending on entityKind."
  accountId: "Account id for Session. Use N/A otherwise."
  clientVersion: "Client version for Session. Use N/A if absent."
  platform: "Platform string, such as PC, Console, Mobile. Use N/A if absent."
  serverId: "Server id for Session. Use N/A if absent."
  sessionState: "For Session, choose one enum: Disconnected, Authenticating, CharacterSelection, LoadingCharacter, InGame, InLobby, Reconnecting, Disconnecting."
  connectionQuality: "For Session, choose one enum: Stable, Unstable, Laggy, Dropped."
  timestamps: "Structured object with connectedAt, lastActivityAt, createdAt, startedAt, completedAt, closedAt, endedAt as applicable."
  activeCharacterId: "Current selected Player id for Session. Use N/A if none."
  availableCharacterIds: "Array of Player ids owned by the account."
  groupLinks: "Structured object with partyId, raidId, guildId, battlegroundId, arenaTeamId, currentInstanceId."
  matchmakingState: "For Session, choose one enum: NotQueued, Queued, Matched, Loading, InMatch, PostMatch."
  queuedRoles: "Array of GroupRole enums: Leader, Officer, Member, Trial, Spectator."
  queueStartedAt: "Queue start timestamp as number. Use 0 if not queued."
  activityType: "Choose one enum: Idle, Questing, Dungeoning, Raiding, PvPing, Crafting, Trading, Exploring, Chatting, AFK."
  idleSeconds: "Idle duration in seconds."
  currentScreenStack: "Array of currently open Screen ids, top to bottom."
  lastErrorCode: "Most recent error code. Use empty string or N/A if none."
  pendingNotifications: "Array of Notification objects."
  sessionFlags: "Structured object with isGM, isBot, isNewSession, hasPendingTransitions booleans."
  party: "For Party only: object with members, leaderId, maxSize, currentSize, lootDistribution enum FreeForAll/RoundRobin/GroupLoot/MasterLoot/NeedBeforeGreed/Personal, lootThreshold, masterLooterId, difficultyLevel, isPublic, autoKickIdleSeconds, partyPurpose enum General/DungeonRun/RaidRun/PvPBattleground/WorldQuesting/Leveling/Achievement, targetInstanceId, isLocked, instanceLocked."
  raid: "For Raid only: object with subParties, leaderId, assistantLeaderIds, maxSize, lootDistribution, masterLooterId, difficultyLevel, saveId."
  guild: "For Guild only: object with guildId, name, faction, members, leaderId, maxMembers, level, experience, achievements, guildBankId, guildCurrency, ranks, description, motd, isRecruiting."
  instance: "For Instance only: object with zoneId, lifecycleState enum NotCreated, Creating, Ready, Active, Paused, Completing, Completed, Closing, Closed, Abandoned; ownerGroupId, ownerGroupType enum Solo/Party/Raid/Battleground/Arena/Guild/Alliance, participants, maxParticipants, difficultyLevel, seed, modifiers, objectivesCompleted, bossesKilled, currentPhase, resetSchedule, savedForCharacters, deathCount, startTimeElapsed, wipeCount."
  battleground: "For Battleground only: object with bgId, zoneId, teams, maxPlayersPerTeam, matchState enum WarmUp, InProgress, Ending, Ended, Cancelled; startedAt, endedAt, winningTeamIndex, scores."
  notification: "For Notification only: object with notificationType enum PartyInvite, GuildInvite, TradeRequest, DuelRequest, FriendRequest, SystemAnnouncement, MailReceived, QuestUpdate, AchievementUnlocked, ErrorMessage, ReconnectWarning; severity enum Info, Warning, Error, Critical; messageKey, data, createdAt, acknowledged."
  invariant_violations: "List session/social schema violations, such as InGame without activeCharacterId, CharacterSelection with activeCharacterId, activeCharacterId not owned, Dropped with wrong sessionState, simultaneous partyId and raidId, currentInstance missing active participant, Party size over max, leader not member, multiple Party leaders, Guild rank missing, Guild leader not rank 1, Active Instance without ownerGroupId, Completed Instance without completedAt, Queued matchmaking without queueStartedAt, or screen ids missing. Use [] if none."
