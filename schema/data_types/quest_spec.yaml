name: "Quest Spec"
description: "Extracts quest templates, quest instances, objectives, preconditions, rewards, quest logs, failure modes, and progression state."
fields:
  entityKind: "Choose one enum: QuestTemplate, QuestInstance, QuestLog."
  id: "Quest template id, quest instance id, or owner id for QuestLog."
  name: "Quest display name for QuestTemplate. Use N/A otherwise."
  version: "Version or patch version. Use N/A if absent."
  category: "Choose one enum: MainStory, SideQuest, Daily, Weekly, Repeatable, Seasonal, Event, Hidden, Tutorial, Achievement, GuildQuest, WorldQuest, Bounty."
  frequency: "Choose one enum: OneTime, Daily, Weekly, Monthly, Seasonal, Always, OnTrigger."
  state: "For QuestInstance, choose one enum: NotAvailable, Available, Accepted, InProgress, ReadyToComplete, Completed, Failed, Abandoned, Expired."
  acceptPreconditions: "Array of QuestPrecondition objects: condition, expected, reason, priority."
  questGiver: "Structured object with giverType enum NPC, Object, System, Mail, PickupItem, ZoneEntry; giverId, startZoneId, completeZoneId, completeGiverId."
  objectives: "Structured array. Each Objective includes id, order, objectiveType enum KillMonster, KillPlayer, CollectItem, DeliverItem, TalkToNPC, ReachLocation, UseSkill, UseItem, CompleteInteraction, CompleteDungeon, SurviveDuration, EscortNPC, DefendLocation, GainLevel, EarnCurrency, TrainSkill, CompleteQuest, CustomEvent; targetType enum SpecificEntity, TemplateMatch, TagMatch, LocationArea; targetId, targetTag, requiredCount, currentCount, conditions, timeLimit, showInTracker, showCountOnKill, isOptional, isHidden."
  objectiveLogic: "Choose one enum: AllOf, AnyOf, Sequential, NofM."
  limits: "Structured object with timeLimit, levelMin, levelMax, requiredClass array, requiredFaction, requiredZone, requiredPreviousQuest array."
  failureModes: "Array of FailureMode enums: NoFailure, OnPlayerDeath, OnTimeout, OnEscortTargetDeath, OnLocationLeft, OnItemLost, OnZoneChange."
  failureConsequences: "Array of Effect objects applied on failure."
  rewards: "Structured array. Each QuestReward includes rewardType enum Experience, Currency, Item, ItemChoice, ItemRandom, Skill, Reputation, Achievement, Title, CosmeticUnlock, ZoneUnlock, InteractionUnlock; amount, currencyType, itemId, quantity, choices, dropTable, unlockId, condition enum Always, FirstCompletionOnly, WithinTimeLimit, NoDeath, SoloCompletion, PartyCompletion, HardModeOnly."
  sideEffects: "Structured object with onAccept, onComplete, onAbandon arrays of Effect objects."
  chain: "Structured object with nextQuest and questChain ids."
  flags: "Structured object with isHidden, isShareable, isAbandonable, autoAccept, autoComplete, trackable booleans."
  instanceState: "For QuestInstance only: templateId, ownerId, acceptedAt, completedAt, expiresAt, objectiveProgress array, isRewarded, chosenRewardIndex, grantedRewards, isTracked, isFailed, failReason."
  questLog: "For QuestLog only: ownerId, activeQuests, completedQuestIds, failedQuestIds, trackedQuestIds, maxActiveSlots."
  invariant_violations: "List quest schema violations, such as Daily without expiresAt, timeLimit without OnTimeout, ItemChoice with fewer than 2 choices, Completed without all required objectives complete, autoComplete not completing, nextQuest missing reciprocal previous requirement, non-abandonable allowing Abandoned, requiredCount <= 0, currentCount outside bounds, Achievement not OneTime, or invalid Mail giver zone dependency. Use [] if none."
