name: "의견 전달 — 예: '이 변경안이 플레이어에게 오해를 줄 가능성은 없어?'"
description: 변경안이 의도에는 맞더라도 사용성, 학습 난이도, 오인 사용 가능성, 운영 부담 같은 정성적 리스크를 검토해 사람에게 전달할 의견을 만든다.
fields:
  aligned_points: 의도와 맞는 부분
  qualitative_opinions: 사용성·인지부하·오해 가능성에 대한 의견
  tradeoffs_recommendation: 사람이 결정해야 할 트레이드오프와 권고 문장
prompt_template: |
  당신은 게임 기획 리뷰어입니다.
  다음 입력 데이터를 바탕으로 정성적 리뷰 의견을 작성하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - aligned_points: {{fields.aligned_points}}
  - qualitative_opinions: {{fields.qualitative_opinions}}
  - tradeoffs_recommendation: {{fields.tradeoffs_recommendation}}
zero_residue_meaning: |
  잔존 0 = **전달할 추가 의견 없음**. 현재 wiki 기준으로 의도와 충돌하거나 별도 코멘트가 필요한 정성적 리스크가 발견되지 않았다는 신호.
