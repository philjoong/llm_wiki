name: "테스트 공백 탐지 — 예: '던전 입장 시스템에서 아직 QA 케이스가 없는 영역이 어디야?'"
description: 기능·시스템·콘텐츠 중 QA가 누락되었거나 회귀 케이스가 정의되지 않은 영역을 식별한다.
fields:
  empty_qa_pages: QA 자산이 비어 있는 페이지 목록
  new_case_candidates: 신규로 정의해야 할 케이스 후보
prompt_template: |
  당신은 QA 품질 보증 전문가입니다.
  다음 입력 데이터를 바탕으로 테스트 공백을 탐지하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - empty_qa_pages: {{fields.empty_qa_pages}}
  - new_case_candidates: {{fields.new_case_candidates}}
zero_residue_meaning: |
  잔존 0 = **공백 없음**. 대상 영역의 모든 시스템·기능에 대응하는 QA 자산이 존재한다는 신호.
