name: "Interaction Spec"
description: "Extracts non-combat game interactions and flows such as purchase, teleport, dungeon entry, crafting, social actions, preconditions, costs, effects, feedback, and failure handling."
fields:
  entityKind: "Choose one enum: Interaction, InteractionFlow."
  id: "Stable interaction or flow id, such as interaction.teleport or flow.world_map_teleport."
  name: "Display name."
  version: "Version or patch version. Use N/A if absent."
  category: "Choose one enum: Movement, Commerce, Crafting, Social, Progression, Management, WorldInteraction, Instance, Customization, System."
  type: "Choose one enum: Atomic, Composite, Staged, Cancellable, Irreversible."
  executionMode: "Choose one enum: Instant, Timed, Interactive, Channeled, Queued."
  targetSelectionMode: "Choose one enum: NoTarget, SelfOnly, FromUIList, FromWorldClick, FromInventorySlot, AutoSelect, FromSearch."
  preconditions: "Structured array. Each item includes condition enum Player.Alive, Player.NotInCombat, Player.LevelAtLeast, Player.ClassIsOneOf, Player.NotStunned, Player.NotSilenced, Player.NotMounted, Zone.TypeIsOneOf, Zone.AllowsAction, Zone.SafetyLevelAtLeast, Player.HasCurrency, Player.HasItem, Player.InventoryHasSpace, Player.BagSpaceAtLeast, Quest.Completed, Quest.Active, Achievement.Unlocked, Session.LoggedIn, Session.CharacterSelected, Session.NotTransitioning, UI.ScreenOpen, UI.NoBlockingModal, Interaction.CooldownReady, Interaction.NotAlreadyRunning, Always, Never; expected; reason; priority; bypassable."
  costs: "Structured array. Each InteractionCost includes costType enum Currency, Item, Resource, Time, Durability, Free; currencyType, itemId, amount, consumedOn enum OnStart, OnSuccess, OnComplete, PeriodicDuringChannel; refundable."
  parameters: "Structured array. Each param includes name, paramType enum ZoneId, PlayerId, MonsterId, ItemId, ItemInstanceId, SkillId, CurrencyAmount, Quantity, String, Number, Boolean, Vector3; required, default, validation array from NotEmpty, PositiveInteger, MustExist, OwnedByPlayer, InZone, WithinRange."
  casting: "Structured object with castDuration, cancelableWhileCasting, interruptOnDamage, interruptOnMove."
  effectsOnStart: "Array of Effect objects applied when the interaction starts."
  effectsOnSuccess: "Array of Effect objects applied on success."
  effectsOnCancel: "Array of Effect objects applied on cancel."
  effectsOnFail: "Array of Effect objects applied on failure."
  failReasons: "Structured array. Each item includes code enum InsufficientCurrency, InsufficientItem, InsufficientResource, InventoryFull, BagSpaceInsufficient, NotEnoughLevel, WrongClass, WrongFaction, InCombat, Dead, Silenced, Stunned, ZoneRestricted, SafeZoneViolation, PvPRuleViolation, OutOfRange, NotInValidLocation, OnCooldown, AlreadyRunning, DuplicateRequest, TargetNotFound, TargetNotValid, TargetBound, TargetUnique, QuestNotCompleted, PrerequisiteNotMet, NotAvailableYet, NetworkError, ServerBusy, Forbidden, InvalidParameter, InstanceFull, InstanceClosed, Unknown; severity enum Info, Warning, Error, Critical; feedbackType; recoverable."
  feedback: "Structured object with onStart, onProgress, onSuccess, onFail, onCancel. Each FeedbackAction includes type enum Silent, Toast, Popup, Modal, Sound, VisualEffect, ScreenShake, HapticVibration, LogMessage; messageKey, popupScreenId, soundId, vfxId, durationMs."
  sideEffects: "Structured array. Each SideEffect includes trigger enum OnStart, OnSuccess, OnFail, OnZoneChange, OnInstanceEnter, OnInstanceExit, OnCombatStateChange, OnMountChange; effect; optional condition."
  allowedContexts: "Array of ExecutionContext enums: FromUI.WorldMap, FromUI.Shop, FromUI.Inventory, FromUI.QuestWindow, FromUI.DungeonFinder, FromUI.AuctionHouse, FromUI.CharacterSelect, FromWorld.NPCInteraction, FromWorld.ObjectInteraction, FromHotkey, FromScript, FromMail, FromChat."
  logging: "Structured object with logged boolean and analyticsEvent string."
  flowSteps: "For InteractionFlow only: array of FlowStep objects with stepOrder, interactionId, onSuccess, onFail, timeout."
  rollbackOnFail: "For InteractionFlow only: boolean."
  invariant_violations: "List interaction schema violations, such as Channeled not cancelable, Irreversible with cancel effects, OnStart cost without refundable, precondition reason missing failReason, required parameter missing, NoTarget with target parameter, empty allowedContexts for non-system use, OnInstanceEnter side effect outside Instance category, missing feedback.onFail with failReasons, duplicate flow stepOrder, missing interactionId, or currencyType used for non-Currency cost. Use [] if none."
