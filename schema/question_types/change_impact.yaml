name: "기존 요소 변경 영향 분석 — 예: '스킬 A의 쿨타임을 10초에서 8초로 바꾸면 어떤 시스템에 영향이 가?'"
description: 이미 존재하는 요소의 수치·공식·정책·콘텐츠를 수정했을 때 다른 시스템·콘텐츠에 어떤 영향이 전이되는지 추적한다. 새 요소를 추가하는 경우가 아니라 기존 값·규칙의 변경에만 해당한다(새 시스템 도입은 '신규 시스템 추가 영향도'를 사용).
fields:
  affected_pages: 영향받는 페이지 목록 (related 연결 + 출처 인용을 따라간 결과)
  update_candidates: 동시 갱신이 필요한 페이지 후보
required_info:
  change_target: 무엇을 변경하는가 — 대상 요소(스킬·수치·정책·콘텐츠)
  change_detail: 어떻게 변경하는가 — 변경 전/후 값이나 규칙의 구체적 내용
  dependency_map: 대상 요소가 다른 시스템·콘텐츠와 어떤 의존/영향 관계로 연결되는지
retrieval:
  graph_expand: 2
  predicate_axes: [dependency]
prompt_template: |
  당신은 시스템 영향 분석가입니다.
  제공된 Citation Sections를 바탕으로 변경 영향을 분석하고 결과를 구조화된 형식으로 출력하세요.
  제공된 컨텍스트에 없는 영향은 추측하지 말고, 근거가 있는 영향만 제시하세요.
zero_residue_meaning: |
  잔존 0 = **영향 격리 완료**. 이 변경이 다른 페이지로 전이되지 않는다는 신호.
  독립적으로 적용 가능하다.
