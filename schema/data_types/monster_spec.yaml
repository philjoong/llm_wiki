name: "Monster Spec"
description: "Extracts a monster or hostile NPC as a template/instance with species, rank, AI behavior, combat stats, aggro, loot, spawn, and behavior rules."
fields:
  id: "Monster instance id. Use templateId if only a template is described."
  templateId: "Monster template id, such as monster.goblin_warrior."
  name: "Monster display name."
  species: "Choose one enum: Humanoid, Beast, Undead, Demon, Dragon, Elemental, Construct, Aberration, Plant, Insect."
  rank: "Choose one enum: Trash, Normal, Elite, Rare, Champion, MiniBoss, Boss, RaidBoss, WorldBoss."
  behaviorType: "Choose one enum: Passive, Defensive, Aggressive, Territorial, Pack, Caster, Tank, Berserker."
  faction: "Faction tag, such as faction.goblins."
  difficulty: "Structured object with level, difficultyTier, experienceReward, goldReward."
  resources: "Structured object with hp, hpMax, mana, manaMax."
  combatStats: "Structured object with attackPower, spellPower, defense, magicResist, critChance, attackSpeed, moveSpeed."
  resistances: "Structured array. Each item includes damageType enum Physical, Magical, True, Fire, Ice, Lightning, Poison, Holy, Shadow, None and multiplier number."
  immunities: "Array of immunity tags: CC.Stun, CC.Silence, CC.Root, CC.Slow, CC.Knockback, CC.Pull, CC.Airborne, CC.Fear, CC.Sleep, CC.Charm, Damage.True, Dispel, Taunt."
  lifeState: "Choose one enum reused from Player: Alive, Dead, Ghost, Reviving."
  spawnState: "Choose one enum: NotSpawned, Spawning, Alive, Dying, Dead, Despawning, Respawning."
  aggroState: "Choose one enum: Idle, Alerted, Engaged, Searching, Returning, Leashed."
  combatState: "Choose one enum: InCombat, OutOfCombat, Engaging."
  movementState: "Choose one enum: Idle, Walking, Running, Sprinting, Jumping, Falling, Mounted, Flying, Swimming."
  controlState: "Array of enums: Normal, Stunned, Silenced, Rooted, Slowed, Feared, Airborne, Sleeping, Charmed."
  visibilityState: "Choose one enum: Visible, Stealthed, Invisible, Detected."
  lootState: "Choose one enum: Unlooted, Locked, Tapped, Looted, Decayed."
  buffs: "Structured array of StatusEffect objects: id, source, stacks, durationRemaining, dispellable."
  debuffs: "Structured array of StatusEffect objects: id, source, stacks, durationRemaining, dispellable."
  territory: "Structured object with position Vector3, rotation, zoneId, spawnPoint Vector3, leashRange, aggroRange."
  aggroTable: "Structured array of AggroEntry: entityId, threat, lastHitTime, decayRate."
  primaryTargetId: "Current highest-priority target id. Use N/A if none."
  skillSlots: "Structured array: slotIndex, skillId, level, cooldownRemaining, chargesCurrent, enabled."
  skillUsagePolicy: "Structured object with rotation enum Sequential, Random, PriorityBased, PhaseBased, Reactive and priorityList items skillId, priority, condition, cooldownAware, targetFilter."
  lootTable: "Structured array of LootEntry: itemId, dropChance, minQuantity, maxQuantity, condition enum Always, KilledByPlayer, KilledInParty, KilledInRaid, FirstKillOfDay, KilledWithSkillTag.Fire."
  respawn: "Structured object with respawnTimer and respawnTimerMax numbers."
  behaviorRules: "Structured array. Each item includes name, priority, trigger enum OnSpawn, OnTargetSeen, OnDamaged, OnHPChanged, OnTargetLost, OnAllyDeath, OnPhaseChange, OnTick, OnDeath; condition enum Always, HPBelow30Percent, HPBelow10Percent, EnragedPhase, OneOrMoreAlliesAlive, OneOrMoreAlliesDead, TargetInMelee, TargetOutOfRange, TargetLowHP, TargetIsHealer, ThreeOrMoreEnemiesInMelee, OutsideLeashRange; action enum Attack, Flee, Call_Reinforcement, Enrage, UseSkill, Taunt, ReturnToSpawn, Patrol, Despawn, TransformPhase."
  flags: "Structured object with isElite, isBoss, isQuestTarget, isTamable booleans."
  invariant_violations: "List monster schema violations, such as Dead not Leashed/OutOfCombat, empty aggroTable with non-Idle aggroState, Boss rank with isBoss false, RaidBoss lootState not Locked/Unlooted, stun immunity with Stunned state, missing ReturnToSpawn leash rule, skillSlots missing usage policy, or respawnTimer>0 without Respawning. Use [] if none."
