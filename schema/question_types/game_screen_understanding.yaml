name: 게임 화면 이해
description: 현재 게임 화면이나 상황 설명을 바탕으로 어떤 상태가 벌어지고 있는지 파악한다.
fields:
  situation_summary: 현재 게임 상황 요약
  cited_rules: 관련 규칙·시스템 페이지 인용
  uncertainties: 확실한 판단과 추가 확인이 필요한 불확실성 구분
prompt_template: |
  당신은 게임 상황 분석가입니다.
  다음 입력 데이터를 바탕으로 상황을 해석하고 결과를 구조화된 형식으로 출력하세요.
  
  ## Context
  {{context}}
  
  ## User Question
  {{question}}
  
  ## Output Format
  JSON 형식으로 답변하세요. 키는 다음과 같습니다:
  - situation_summary: {{fields.situation_summary}}
  - cited_rules: {{fields.cited_rules}}
  - uncertainties: {{fields.uncertainties}}
zero_residue_meaning: |
  잔존 0 = **상황 판단 근거 부족**. 화면 요소나 관련 규칙이 wiki에 충분히 연결되지 않아 현재 상황을 안정적으로 해석할 수 없다는 신호.
